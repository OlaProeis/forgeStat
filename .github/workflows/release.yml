# GitHub Actions workflow for releasing forgeStat
# Builds binaries and MSI installer for Windows, archives for macOS/Linux
#
# Trigger with: git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # Build Windows binary and MSI
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Build release binary
        run: cargo build --release

      - name: Create MSI installer
        run: cargo wix --no-build --output target/wix/forgeStat-${{ github.ref_name }}-x86_64-pc-windows-msvc.msi

      - name: Create ZIP archive
        shell: powershell
        run: |
          Compress-Archive -Path target/release/forgeStat.exe -DestinationPath target/forgeStat-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            target/wix/*.msi
            target/*.zip

  # Build macOS binaries
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch }}-apple-darwin

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.arch }}-apple-darwin

      - name: Create tar.gz archive
        run: |
          cd target/${{ matrix.arch }}-apple-darwin/release
          tar czf ../../../forgeStat-${{ github.ref_name }}-${{ matrix.arch }}-apple-darwin.tar.gz forgeStat
          cd ../../..

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-artifacts
          path: target/*.tar.gz

  # Build Linux binaries
  build-linux:
    name: Build Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tar.gz archive
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../forgeStat-${{ github.ref_name }}-${{ matrix.target }}.tar.gz forgeStat
          cd ../../..

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: target/*.tar.gz

  # Create installer scripts
  build-installers:
    name: Build Installer Scripts
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create install.sh
        run: |
          mkdir -p target/dist
          cat > target/dist/install.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail

          REPO="OlaProeis/forgeStat"
          BINARY_NAME="forgeStat"
          INSTALL_DIR="${INSTALL_DIR:-$HOME/.local/bin}"

          info() { echo -e "\033[0;34m[INFO]\033[0m $1"; }
          success() { echo -e "\033[0;32m[SUCCESS]\033[0m $1"; }
          error() { echo -e "\033[0;31m[ERROR]\033[0m $1"; }

          detect_platform() {
            local os arch
            case "$(uname -s)" in
              Linux*) os="linux"; arch="x86_64-unknown-linux-gnu" ;;
              Darwin*)
                os="macos"
                case "$(uname -m)" in
                  x86_64) arch="x86_64-apple-darwin" ;;
                  arm64) arch="aarch64-apple-darwin" ;;
                  *) error "Unsupported architecture: $(uname -m)"; exit 1 ;;
                esac
                ;;
              *) error "Unsupported OS: $(uname -s)"; exit 1 ;;
            esac
            echo "$arch"
          }

          main() {
            info "forgeStat Installer"
            info "==================="

            platform=$(detect_platform)
            info "Detected platform: $platform"

            version=$(curl -s "https://api.github.com/repos/$REPO/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
            if [ -z "$version" ]; then
              error "Failed to get latest version"
              exit 1
            fi
            info "Latest version: $version"

            url="https://github.com/$REPO/releases/download/${version}/forgeStat-${version}-${platform}.tar.gz"
            info "Downloading from: $url"

            tmpdir=$(mktemp -d)
            trap "rm -rf $tmpdir" EXIT

            curl -fsSL "$url" -o "$tmpdir/forgeStat.tar.gz"
            tar -xzf "$tmpdir/forgeStat.tar.gz" -C "$tmpdir"

            info "Installing to $INSTALL_DIR..."
            mkdir -p "$INSTALL_DIR"
            cp "$tmpdir/forgeStat" "$INSTALL_DIR/"
            chmod +x "$INSTALL_DIR/forgeStat"

            success "forgeStat installed to $INSTALL_DIR/forgeStat"

            if [[ ":$PATH:" != *":$INSTALL_DIR:"* ]]; then
              echo ""
              echo "Add this to your shell profile:"
              echo "  export PATH=\"$INSTALL_DIR:\$PATH\""
            fi
          }

          main "$@"
          SCRIPT
          chmod +x target/dist/install.sh

      - name: Create install.ps1
        run: |
          cat > target/dist/install.ps1 << 'SCRIPT'
          # forgeStat Windows Installer
          $ErrorActionPreference = "Stop"

          $Repo = "OlaProeis/forgeStat"
          $InstallDir = "$env:LOCALAPPDATA\forgeStat"

          function Write-Info($msg) { Write-Host "[INFO] $msg" -ForegroundColor Cyan }
          function Write-Success($msg) { Write-Host "[SUCCESS] $msg" -ForegroundColor Green }
          function Write-Error($msg) { Write-Host "[ERROR] $msg" -ForegroundColor Red }

          Write-Info "forgeStat Windows Installer"
          Write-Info "==========================="

          # Detect architecture
          $arch = switch ($env:PROCESSOR_ARCHITECTURE) {
            "AMD64" { "x86_64-pc-windows-msvc" }
            "ARM64" { "aarch64-pc-windows-msvc" }
            default { Write-Error "Unsupported: $env:PROCESSOR_ARCHITECTURE"; exit 1 }
          }
          Write-Info "Detected: $arch"

          # Get latest release
          try {
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$Repo/releases/latest"
            $version = $release.tag_name
          } catch {
            Write-Error "Failed to get latest release: $_"
            exit 1
          }
          Write-Info "Latest version: $version"

          # Try MSI first
          $msiUrl = "https://github.com/$Repo/releases/download/$version/forgeStat-$version-$arch.msi"
          $tempDir = Join-Path $env:TEMP ([System.Guid]::NewGuid().ToString())
          New-Item -ItemType Directory -Path $tempDir -Force | Out-Null

          try {
            Write-Info "Downloading MSI from $msiUrl..."
            $msiPath = Join-Path $tempDir "forgeStat.msi"
            Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath -ErrorAction Stop

            Write-Info "Installing MSI..."
            $process = Start-Process msiexec.exe -ArgumentList "/i", "`"$msiPath`"", "/passive", "/norestart" -Wait -PassThru
            if ($process.ExitCode -eq 0) {
              Write-Success "Installation complete!"
              exit 0
            }
          } catch {
            Write-Info "MSI failed, trying ZIP fallback..."
          }

          # Fallback to ZIP
          $zipUrl = "https://github.com/$Repo/releases/download/$version/forgeStat-$version-$arch.zip"
          try {
            Write-Info "Downloading from $zipUrl..."
            $zipPath = Join-Path $tempDir "forgeStat.zip"
            Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath

            Write-Info "Extracting..."
            Expand-Archive -Path $zipPath -DestinationPath $tempDir -Force

            Write-Info "Installing to $InstallDir..."
            New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
            Copy-Item -Path (Join-Path $tempDir "forgeStat.exe") -Destination $InstallDir -Force

            # Add to PATH
            $userPath = [Environment]::GetEnvironmentVariable("PATH", "User")
            if ($userPath -notlike "*$InstallDir*") {
              [Environment]::SetEnvironmentVariable("PATH", "$userPath;$InstallDir", "User")
              Write-Info "Added to PATH. Restart your terminal."
            }

            Write-Success "Installation complete!"
          } catch {
            Write-Error "Installation failed: $_"
            exit 1
          } finally {
            Remove-Item -Path $tempDir -Recurse -Force -ErrorAction SilentlyContinue
          }
          SCRIPT

      - name: Upload installer scripts
        uses: actions/upload-artifact@v4
        with:
          name: installer-scripts
          path: target/dist/*

  # Create GitHub Release and upload all assets
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux, build-installers]
    if: always() && needs.build-windows.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: "*-artifacts"

      - name: List artifacts
        run: |
          echo "Artifacts downloaded:"
          find artifacts -type f | sort

      - name: Create Release and Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          echo "Creating release for $tag (version $version)..."

          # Create or update release
          gh release create "$tag" \
            --title "forgeStat $tag" \
            --notes "## Install forgeStat

### Windows (PowerShell)
\`\`\`powershell
iwr https://github.com/OlaProeis/forgeStat/releases/download/${tag}/install.ps1 -UseBasicParsing | iex
\`\`\`

### macOS/Linux
\`\`\`bash
curl -fsSL https://github.com/OlaProeis/forgeStat/releases/download/${tag}/install.sh | bash
\`\`\`

### Manual Download
See assets below." \
            --repo "${GITHUB_REPOSITORY}" || true

          # Upload all artifacts
          for dir in artifacts/*/; do
            for file in "$dir"/*; do
              if [ -f "$file" ]; then
                echo "Uploading $(basename $file)..."
                gh release upload "$tag" "$file" --clobber --repo "${GITHUB_REPOSITORY}"
              fi
            done
          done

          echo "Release $tag complete!"
